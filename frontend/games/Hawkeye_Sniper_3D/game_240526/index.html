    <script type="text/javascript">
    function loadLib(url,callback) {
        var script = document.createElement("script");
        script.async = false;
        if(window.fileObj && window.fileObj[url]){
            url = window.fileObj[url];
        }
        script.src = url;
        script.addEventListener('load', function () {
            script.parentNode.removeChild(script);
            script.removeEventListener('load', arguments.callee, false);
            callback&&callback();
        }, false);
        document.body.appendChild(script);
    }

    if(parent.window.isLoadInIn)
    {
        loadLib("https://www.iningame.com/cy/cy_game/sdk/ADManage_2028.js")
        loadLib("https://www.iningame.com/cy/cy_game/sdk/lParse1.0.js");
    }else{
        loadLib("https://www.lxtgame.com/Road_Cross/sdk/ADManage_2028.js")
        loadLib("https://www.ooppgame.com/City_Run/sdk/lParse1.0.js");
    }
    </script>
