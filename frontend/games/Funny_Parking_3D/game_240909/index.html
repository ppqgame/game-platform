    <style>


        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            overflow: 'hidden';
            /* 页面背景颜色 */
            background: #b4bdc9
        }

        #unity-container {
            z-index: 1000;
            background: #b4bdc9;
            position: absolute;
            overflow: hidden;
        }

        #LoadingView {
            position: absolute;
            left: 50%;
            top: 50%;
            height: 100%;
            width: 100%;
            overflow: hidden;
            transform: translate(-50%, -50%);

            text-align: center;
        }

        #top-container {
            flex: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 距离顶部位置 */
            margin-top: 10%;
        }

        #progress {
            flex: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            bottom: 10%;
        }

        div {
            text-align: center;
        }
    </style>
