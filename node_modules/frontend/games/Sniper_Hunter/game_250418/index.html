<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">

	<title>Cocos Creator</title>

	<!--http://www.html5rocks.com/en/mobile/mobifying/-->
	<meta name="viewport"
		content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true" />

	<!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="format-detection" content="telephone=no">

	<!-- force webkit on 360 -->
	<meta name="renderer" content="webkit" />
	<meta name="force-rendering" content="webkit" />
	<!-- force edge on IE -->
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<meta name="msapplication-tap-highlight" content="no">

	<!-- force full screen on some browser -->
	<meta name="full-screen" content="yes" />
	<meta name="x5-fullscreen" content="true" />
	<meta name="360-fullscreen" content="true" />

	<!--fix fireball/issues/3568 -->
	<!--<meta name="browsermode" content="application">-->
	<meta name="x5-page-mode" content="app">

	<!--<link rel="apple-touch-icon" href=".png" />-->
	<!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

	<link rel="stylesheet" type="text/css" href="style.css" />

</head>

<body>

	<script>
		window.$T_GAME_VERSION = "2.102"
		window.$T_PROGRESS = 0;
		window.$T_FB_Width = 0;
		window.$T_FB_Height = 0;
		window.$T_FB_INITIALIZED = false;

	</script>

	<script>
		window.onresize = adjuest;
		adjuest();

		function adjuest() {
			if (window.innerWidth != window.$T_FB_Width && window.$T_FB_Width > 0) {
				window.innerWidth = window.$T_FB_Width;
			}
			if (window.innerHeight != window.$T_FB_Height && window.$T_FB_Width > 0) {
				window.innerHeight = window.$T_FB_Height;
			}
		}
	</script>
	<div id="GameDiv" cc_exact_fit_screen="true">
		<div id="Cocos3dGameContainer">
			<canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
		</div>
	</div>
	<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

    <script type="text/javascript">
		function loadLib(url,callback) {
		  var script = document.createElement("script");
		  script.async = false;
		  script.src = url;
		  script.addEventListener('load', function () {
			script.parentNode.removeChild(script);
			script.removeEventListener('load', arguments.callee, false);
			callback&&callback();
		  }, false);
		  document.body.appendChild(script);
		}
		loadLib("https://www.lxtgame.com/Road_Cross/sdk/ADManage_2028.js")
		loadLib("cParse3.x.js");
	  
	  
	  </script>

</body>

</html>
