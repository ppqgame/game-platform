<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Cocos Creator | hello_world</title>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  
  <!-- force screen orientation on some browser -->
  <meta name="screen-orientation" content="portrait"/>
  <meta name="x5-orientation" content="portrait">

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="style-mobile.css"/>
  <link rel="icon" href="favicon.ico"/>

  <style>
    /* 遮罩层样式 */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      display: none; /* 默认隐藏 */
    }

    /* Loading 图标样式 */
    #loading-icon {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

</head>
<body>
  <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
  <div id="splash">
    <div class="progress-bar stripes">
      <span style="width: 0%"></span>
    </div>
  </div>

  <!-- 遮罩层 -->
<div id="loading-overlay">
  <div id="loading-icon"></div>
</div>

<script>
  // 显示 Loading
  function _showLoading() {
    document.getElementById('loading-overlay').style.display = 'flex';
  }

  // 隐藏 Loading
  function _hideLoading() {
    document.getElementById('loading-overlay').style.display = 'none';
  }

</script>

<script type="text/javascript">
  function loadLib(url,callback) {
      var script = document.createElement("script");
      script.async = false;
      script.src = url;
      script.addEventListener('load', function () {
          script.parentNode.removeChild(script);
          script.removeEventListener('load', arguments.callee, false);
          callback&&callback();
      }, false);
      document.body.appendChild(script);
  }

	if(parent.window.isLoadInIn)
    {
        loadLib("https://www.iningame.com/cy/cy_game/sdk/ADManage_2028.js")
    }else{
        loadLib("https://www.lxtgame.com/Road_Cross/sdk/ADManage_2028.js")
    }
	loadLib("CLoad.js")
</script>
</body>
</html>
